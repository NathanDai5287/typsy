name: CI

# Runs on every PR push and on pushes to main. PR runs end with a "decide"
# job that:
#   - on test failure, comments with the run URL and applies `status: failing`,
#   - on test success, clears the failing label,
#   - if the PR is labeled `devin-review`, marks it ready (if draft) and
#     enables GitHub auto-merge (merge commit, branch deleted on merge).
#
# Apply `devin-review` only after a human has eyeballed the diff. The label
# is the only manual step in the merge flow.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  push:
    branches: [main]

# Cancel superseded runs on the same PR / branch so we don't waste CI on
# stale commits.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: pnpm build

      - name: Test
        run: pnpm test

  decide:
    name: decide (comment / auto-merge)
    needs: test
    # Run even when test failed so we can post a useful comment. Skip on
    # main-branch pushes — there's no PR to comment on there.
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      # Bootstrap the labels we use so a fresh repo can run this workflow
      # without any manual setup. `--force` overwrites color/description so
      # subsequent runs converge to the canonical metadata.
      - name: Ensure labels exist
        run: |
          gh label create "status: failing" --color B60205 \
            --description "CI is red on the latest commit" \
            --repo "$GITHUB_REPOSITORY" --force >/dev/null 2>&1 || true
          gh label create "merge-conflict"  --color D93F0B \
            --description "Cannot auto-merge — needs rebase against main" \
            --repo "$GITHUB_REPOSITORY" --force >/dev/null 2>&1 || true
          gh label create "devin-review"    --color 0E8A16 \
            --description "Human-approved; auto-merge once CI is green" \
            --repo "$GITHUB_REPOSITORY" --force >/dev/null 2>&1 || true

      - name: On CI failure — comment, label, drop devin-review
        if: needs.test.result == 'failure'
        run: |
          gh pr comment "$PR" --body "CI failed on \`${HEAD_SHA}\`. See [run logs](${RUN_URL}). Removing \`devin-review\` if present — re-add the label after the fix lands."
          gh pr edit "$PR" --add-label    "status: failing" || true
          gh pr edit "$PR" --remove-label "devin-review"    2>/dev/null || true

      - name: On CI green — clear status:failing
        if: needs.test.result == 'success'
        run: |
          gh pr edit "$PR" --remove-label "status: failing" 2>/dev/null || true

      - name: Auto-merge if devin-review label present
        if: needs.test.result == 'success' && contains(github.event.pull_request.labels.*.name, 'devin-review')
        run: |
          MERGEABLE=$(gh pr view "$PR" --json mergeable -q .mergeable)
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            gh pr comment "$PR" --body "Merge conflict — auto-merge skipped. Rebase \`$(gh pr view "$PR" --json headRefName -q .headRefName)\` against \`main\`, push, then re-add the \`devin-review\` label."
            gh pr edit "$PR" --add-label    "merge-conflict" || true
            gh pr edit "$PR" --remove-label "devin-review"   2>/dev/null || true
            exit 0
          fi
          gh pr edit "$PR" --remove-label "merge-conflict" 2>/dev/null || true

          IS_DRAFT=$(gh pr view "$PR" --json isDraft -q .isDraft)
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready "$PR"
          fi

          gh pr comment "$PR" --body "CI green and \`devin-review\` set — enabling auto-merge (merge commit, branch will be deleted)."
          gh pr merge   "$PR" --auto --merge --delete-branch
