name: CI

# Build + test on every PR push, on the merge_group event when GitHub's
# merge queue tests `main + previously-queued PRs + this PR`, and on
# pushes to `main` for sanity. There is no `decide` / auto-merge step
# in this workflow — that lives in `ai-review.yml`, and the actual
# enqueue + merge is handled by GitHub's merge queue.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: pnpm build

      - name: Test
        run: pnpm test
