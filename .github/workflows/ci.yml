name: CI

# Build + test on every PR push, on the merge_group event when GitHub's
# merge queue tests `main + previously-queued PRs + this PR`, and on
# pushes to `main` for sanity. PRs auto-merge once CI is green: the
# `enqueue` job calls `gh pr merge --auto`, which adds the PR to the
# merge queue (or merges directly if no queue is configured) as soon
# as required checks pass.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build
        run: pnpm build

      - name: Test
        run: pnpm test

  auto-merge:
    name: auto-merge on green
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Merge PR
        # Runs only after `test` succeeds (via `needs: test`). We avoid
        # `gh pr merge --auto` because the default GITHUB_TOKEN can't
        # call enablePullRequestAutoMerge ("Resource not accessible by
        # integration"). A direct merge with contents+PR write perms
        # works fine. `|| true` so a race (PR already merged by another
        # run, e.g. force-push) doesn't fail the workflow.
        run: gh pr merge "$PR" --merge --delete-branch || true
